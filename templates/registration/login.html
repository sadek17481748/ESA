{% extends "base/marketing.html" %}

{% block title %}Log in — ESA{% endblock %}

{% block content %}
<section class="panel">
  <h1>Log in</h1>
  <div class="accent-bar"></div>
  {% if form.errors %}
    <p class="lead" style="color:#e57373;">Invalid username or password. Try again.</p>
  {% endif %}
  <form method="post" class="form-stack" action="{% url 'login' %}">
    {% csrf_token %}
    <div class="field">
      <label for="id_username">Username</label>
      {{ form.username }}
    </div>
    <div class="field">
      <label for="id_password">Password</label>
      {{ form.password }}
    </div>
    <button type="submit" class="btn-primary">Sign in</button>
  </form>
  <p class="lead" style="margin-top:1.25rem;margin-bottom:0;">
    <a href="{% url 'pages:register' %}">Create an account</a>
  </p>
</section>
{% endblock %}
