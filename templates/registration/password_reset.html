{% extends "base/marketing.html" %}
{% block title %}Reset password — ESA{% endblock %}
{% block content %}
<section class="panel">
  <h1>Reset password</h1>
  <div class="accent-bar"></div>
  <p class="lead">Enter the email on your account. We will send a reset link.</p>
  <form method="post" class="form-stack">
    {% csrf_token %}
    <div class="field"><label>Email</label>{{ form.email }}</div>
    <button type="submit" class="btn-primary">Send reset link</button>
  </form>
  <p class="lead" style="margin-top:1.25rem;"><a href="{% url 'login' %}">Back to log in</a></p>
</section>
{% endblock %}
