{% extends "base/portal.html" %}
{% block portal_content %}
<section class="panel"><h2 style="margin-top:0;">Upload — {{ track.subject.name }} / {{ track.name }}</h2><div class="accent-bar"></div>
<form method="post" enctype="multipart/form-data" class="form-stack" style="max-width:520px;">{% csrf_token %}{% for field in form %}<div class="field"><label>{{ field.label }}</label>{{ field }}</div>{% endfor %}<button type="submit" class="btn-primary">Upload</button></form>
<p style="margin-top:1rem;"><a href="{% url 'lms:hub' %}">← LMS</a></p></section>
{% endblock %}
