{% extends "base/portal.html" %}
{% block portal_content %}
<section class="panel">
  <h2 style="margin-top:0;">New recitation session</h2>
  <div class="accent-bar"></div>
  <form method="post" class="form-stack" style="max-width:480px;">
    {% csrf_token %}
    {% for field in form %}
    <div class="field"><label>{{ field.label }}</label>{{ field }}</div>
    {% endfor %}
    <button type="submit" class="btn-primary">Create session</button>
    <a href="{% url 'quran:list' %}" style="margin-left:1rem;">Cancel</a>
  </form>
</section>
{% endblock %}
