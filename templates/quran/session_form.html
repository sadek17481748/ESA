{% extends "base/portal.html" %}
{% block portal_content %}
<h1 class="page-title">New Qur’an session</h1>
<p class="page-meta">Choose a student. You will open the mushaf and turn pages with the arrows.</p>

<section class="panel" style="max-width:32rem;">
  <form method="post" class="form-stack">
    {% csrf_token %}
    <div class="field">
      <label for="id_student">Student</label>
      {{ form.student }}
    </div>
    <button type="submit" class="btn-primary">Open mushaf</button>
    <a href="{% url 'quran:list' %}" style="margin-left:1rem;">Cancel</a>
  </form>
</section>
{% endblock %}
