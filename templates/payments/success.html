<!DOCTYPE html>
<!-- ESA — Shown after Stripe redirects back with a paid session_id. -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Payment successful — ESA</title>
  <link rel="stylesheet" href="/css/base.css">
</head>
<body>
  <div class="page-wrap">
    <main class="main-single">
      <section class="panel">
        <h1>Payment successful</h1>
        <div class="accent-bar"></div>
        {% if payment %}
        <p>Thank you. Your payment of <strong>{{ payment.amount_display }}</strong> for <strong>{{ payment.fee_item.title }}</strong> was received.</p>
        <p>Receipt reference: <strong>{{ payment.receipt_reference }}</strong></p>
        {% else %}
        <p>Payment received. Check your fee list for details.</p>
        {% endif %}
        <p style="margin-top:1.5rem;"><a class="btn-primary" href="{% url 'payments:fee_list' %}">Back to fees</a></p>
      </section>
    </main>
  </div>
</body>
</html>
